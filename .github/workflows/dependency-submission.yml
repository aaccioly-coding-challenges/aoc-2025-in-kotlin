name: Dependency Submission

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: { }
  schedule:
    - cron: '0 6 * * 1' # weekly on Monday at 06:00 UTC

permissions:
  contents: write

jobs:
  submit:
    name: Submit dependency information
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Java
        uses: actions/setup-java@1d018f9b8b9b505bb578a83b230fabcce01af93b # match CI pinned version
        with:
          distribution: 'temurin'
          java-version: 25

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
