name: Dependency Submission

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: { }
  schedule:
    - cron: '0 6 * * 1' # weekly on Monday at 06:00 UTC

permissions:
  contents: write

jobs:
  submit:
    name: Submit dependency information
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Java
        uses: actions/setup-java@1d018f9b8b9b505bb578a83b230fabcce01af93b # match CI pinned version
        with:
          distribution: 'temurin'
          java-version: 25

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@0f4528296b4bc09e8ae0fc7be30185a4ab435545 # v6
